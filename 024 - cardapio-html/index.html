<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
	<!-- <meta name="viewport" content="width=800, user-scalable=no"> -->
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>cardapio-HTML</title>
		<link rel="stylesheet" href="./main/css/logobanner.css">
		<link rel="stylesheet" href="./main/css/cadapioitems.css">
		<link rel="stylesheet" href="./main/css/listacompra.css">
		<link rel="stylesheet" href="./main/css/btnwhatapp.css">
		<meta property="og:locale" content="pt_BR">
		<meta property="og:type" content="article">
		<meta property="og:title" content="cardapio-HTML">
		<meta property="og:description" content="Faça seu pedido ou conheça nossas redes sociais.">
		<meta property="og:site_name" content="cardapio-HTML">
		<meta property="og:image" content="./main/image/minilogo.jpeg">
		<meta property="og:image:width" content="1200">
		<meta property="og:image:height" content="630">
		<meta property="og:image:type" content="image/jpeg">
	</head>
	<style>
		*,*::before,*::after {box-sizing: border-box;margin: 0;padding: 0;}
		body {font-family: sans-serif;}
	</style>
	<body>
		<!-- OPEN LOAD -->
		<style>
			/* Tela de loading fixa sobre tudo */
			#loading-screen {
				position: fixed;
				top: 0; left: 0;
				width: 100vw; height: 100vh;
				background-color: #ff6f00;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				z-index: 9999;
				color: #FFFFFF;
				font-family: sans-serif;
				user-select: none;
				transition: opacity 0.5s ease;
			}

			#loading-logo {
				font-size: 4rem;
				font-weight: 900;
				letter-spacing: 4px;
				margin-bottom: 1rem;
				animation: pulse 1.8s infinite;
			}

			#loading-text {
				font-size: 1.8rem;
				font-weight: 600;
				letter-spacing: 2px;
				white-space: nowrap;
				border-left: 3px solid #FFFFFF;
				padding-left: 5px;
				animation: glow 1.8s infinite;
				overflow: hidden;
				width: 20ch;
			}

			@keyframes pulse {
				0%, 100% {
					transform: scale(1);
					opacity: 1;
					text-shadow: 0 0 5px #fff;
				}
				50% {
					transform: scale(1.1);
					opacity: 0.7;
					text-shadow: 0 0 20px #fff;
				}
			}

			@keyframes glow {
				0%, 100% {
					opacity: 1;
					text-shadow: 0 0 10px #fff;
				}
				50% {
					opacity: 0.6;
					text-shadow: 0 0 30px #fff;
				}
			}
		</style>

		<div id="loading-screen">
			<div id="loading-logo"> ☀️ </div>
			<div id="loading-text"></div>
		</div>

		<script>
			const texto = "cardapio-HTML.......";
			const loadingText = document.getElementById('loading-text');
			let i = 0;

			function typeWriter() {
				if (i < texto.length) {
					loadingText.textContent += texto.charAt(i);
					i++;
					setTimeout(typeWriter, 150);
				} else {
					setTimeout(() => {
						const loadingScreen = document.getElementById('loading-screen');
						loadingScreen.style.opacity = '0';
						setTimeout(() => {
							loadingScreen.style.display = 'none';
						}, 500);
					}, 1000);
				}
			}

			window.addEventListener('load', () => {
				typeWriter();
			});
		</script>
		<!-- CLOSE LOAD -->
		<div id="main-container">
			<div id="secundary-container">

				<!-- OPEN comidas -->
				<div id="container-receitas">
					<!-- parte de cima do cardapio -->
					<div class="container-center"></div>
					<!-- OPEN Cardapio AÇAI -->
					<div class="titulo-comida">
						<img src="./main/image/cactus.png" width="23" height="23">
						<span>AÇAI</span>
						<img src="./main/image/cactus.png" width="23" height="23">
					</div>
					<div id="cardapio-acai"></div>
					<!-- OPEN Cardapio BEBIDAS -->
					<div class="titulo-comida">
						<img src="./main/image/cactus.png" width="23" height="23">
						<span>COMIDAS</span>
						<img src="./main/image/cactus.png" width="23" height="23">
					</div>
					<div id="cardapio-comidas"></div>
					<!-- OPEN lanches -->
					<div class="titulo-comida">
						<img src="./main/image/cactus.png" width="23" height="23">
						<span>LANCHES RAPIDOS</span>
						<img src="./main/image/cactus.png" width="23" height="23">
					</div>
					<div id="cardapio-lanches"></div>
					<!-- CLOSE lanches -->
					<!-- OPEN sortidos -->
					<div class="titulo-comida">
						<img src="./main/image/cactus.png" width="23" height="23">
						<span>SORTIDOS</span>
						<img src="./main/image/cactus.png" width="23" height="23">
					</div>
					<div id="cardapio-sortidos"></div>
					<!-- CLOSE sortidos -->
					<!-- OPEN Cardapio BEBIDAS -->
					<div class="titulo-comida">
						<img src="./main/image/cactus.png" width="23" height="23">
						<span>BEBIDAS</span>
						<img src="./main/image/cactus.png" width="23" height="23">
					</div>
					<div id="cardapio-bebidas"></div>
					<!-- CLOSE Cardapio BEBIDAS -->
				</div>
				<!-- CLOSE comidas -->
				<!-- OPEN LISTA DE COMPRAS -->
				<div id="lista-compras">
					<h2>Pedidos <img src="./main/image/compras-online.png" width="25" height="25"></h2>
					<ul id="itens-lista"></ul>
					<div id="total-pedido" style="text-align: center; font-weight: bold; font-size: 18px; margin-top: 10px;">
						Total: R$ 0,00
					</div>
				<div class="form-group" style="margin-top: 10px;">
					<label for="endereco-entrega" style="font-weight: bold;">Nome / Endereço de Entrega:</label>
					<input type="text" id="endereco-entrega" placeholder="Exemplo: João Santos, Rua tal...." style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc;">
				</div>

				<div id="warning" style="margin-top: 10px;">
					<span id="banner-warning-titulo"><img src="./main/image/danger.png" width="26px">Aviso!</span>
					<br>
					<span id="banner-warning">Entrega grátis apenas no Estreito.</span>
				</div>
<button id="enviar-whatsapp">Enviar pedido via WhatsApp.</button>
				</div>
				<!-- CLOSE LISTA DE COMPRAS -->
			</div>
		</div>

<script src="./main/js/newscript.js"></script>
	</body>
</html>
